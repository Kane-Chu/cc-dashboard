name: cc-dashboard-ios
targets:
  cc-dashboard-ios:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - cc-dashboard-ios
    resources:
      - cc-dashboard-ios/Assets.xcassets
    info:
      path: cc-dashboard-ios/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: "cc-dashboard 需要扫描局域网中的服务器"
        NSBonjourServices:
          - _cc-dashboard._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kane.ccdashboard.local
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"

  cc-dashboard-iosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - cc-dashboard-iosTests
    dependencies:
      - target: cc-dashboard-ios
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

  cc-dashboard-iosUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - cc-dashboard-iosUITests
    dependencies:
      - target: cc-dashboard-ios
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  cc-dashboard-ios:
    build:
      targets:
        cc-dashboard-ios: all
    test:
      targets:
        - name: cc-dashboard-iosTests
        - name: cc-dashboard-iosUITests
      preActions:
        - script: |
            if [ -n "$WORKSPACE_PATH" ]; then
              SERVER_JS="$(dirname "$(dirname "$WORKSPACE_PATH")")/../../server.js"
            else
              SERVER_JS=$(find "$HOME" -maxdepth 5 -name "server.js" -path "*/cc-dashboard/*" 2>/dev/null | head -1)
            fi
            if [ -n "$SERVER_JS" ] && [ -f "$SERVER_JS" ] && ! curl -sf http://localhost:7777/api/sessions >/dev/null 2>&1; then
              node "$SERVER_JS" &
              sleep 3
            fi
          name: Start Local Server
          settings:
            target: cc-dashboard-ios
